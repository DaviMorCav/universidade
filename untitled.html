    const formatToYMD = (date) => {
      const d = new Date(date);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    const getDisplayDate = (dateString) => {
      const [y, m, d] = dateString.split('-');
      const date = new Date(y, m - 1, d);
      const dias = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
      const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
      return `${dias[date.getDay()]}, ${d} ${meses[date.getMonth()]}`;
    };

    const addDays = (dateString, days) => {
      const [y, m, d] = dateString.split('-');
      const date = new Date(y, m - 1, d);
      date.setDate(date.getDate() + days);
      return formatToYMD(date);
    };

    const getStartOfWeek = (dateString) => {
      const [y, m, d] = dateString.split('-');
      const date = new Date(y, m - 1, d);
      const day = date.getDay();
      const diff = date.getDate() - day;
      return formatToYMD(new Date(date.setDate(diff)));
    };

    const getTodayYMD = () => {
      const d = new Date(new Date().toLocaleString("en-US", {timeZone: "America/Fortaleza"}));
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    const getDaysUntilStr = (dateStr) => {
      const todayStr = getTodayYMD();
      const [ty, tm, td] = todayStr.split('-');
      const today = new Date(ty, tm - 1, td);
      
      const [y, m, d] = dateStr.split('-');
      const target = new Date(y, m - 1, d);
      
      const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
      
      if (diffDays === 0) return 'Hoje!';
      if (diffDays === 1) return 'Amanhã';
      if (diffDays < 0) return 'Realizada';
      return `Em ${diffDays} dias`;
    };

      Control: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      ChevronLeft: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>,
      ChevronRight: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>,
      Edit: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>,
      Plus: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
      Alert: () => <svg className="w-3.5 h-3.5 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      MapPin: () => <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
      User: () => <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
      Sun: () => <svg className="w-4 h-4 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
      Sunset: () => <svg className="w-4 h-4 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10V2"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="m4.93 10.93 1.41 1.41"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2 18h2"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 18h2"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="m19.07 10.93-1.41 1.41"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M22 22H2"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="m16 6-4 4-4-4"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 18a4 4 0 0 0-8 0"/></svg>,
      Star: () => <svg className="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>,
      Trash: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
      Pencil: () => <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>,
      CloudSync: () => <svg className="w-5 h-5 text-blue-400 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>,
      CloudCheck: () => <svg className="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 13l2 2 4-4" /></svg>,
      CloudError: () => <svg className="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
    };

    // --- HOOK PARA GESTOS DE SWIPE ---
    const useSwipe = (onSwipeLeft, onSwipeRight) => {
      const touchStartX = useRef(null);

      const handleTouchStart = (e) => {
        touchStartX.current = e.touches[0].clientX;
      };

      const handleTouchEnd = (e) => {
        if (!touchStartX.current) return;
        const touchEndX = e.changedTouches[0].clientX;
        const distance = touchStartX.current - touchEndX;
        const minSwipeDistance = 50;

        if (distance > minSwipeDistance) onSwipeLeft();
        if (distance < -minSwipeDistance) onSwipeRight();
        
        touchStartX.current = null;
      };

      return { onTouchStart: handleTouchStart, onTouchEnd: handleTouchEnd };
    };

    // --- SISTEMA DE CORES MATRICIAL ---
    const getTheme = (type, status) => {
      const themes = {
        Teórica: {
          Agendada: { bg: 'bg-blue-500/10', border: 'border-blue-500/30', text: 'text-blue-400', dot: 'bg-blue-400' },
          Presente: { bg: 'bg-blue-500/30', border: 'border-blue-400', text: 'text-blue-200', dot: 'bg-blue-300 shadow-[0_0_8px_rgba(96,165,250,0.8)]' },
          Ausente:  { bg: 'bg-blue-950/30', border: 'border-blue-900/50', text: 'text-blue-600/80', dot: 'bg-blue-800' },
          Cancelada:{ bg: 'bg-zinc-900/50', border: 'border-zinc-800', text: 'text-zinc-600 line-through', dot: 'bg-zinc-700' }
        },
        Prática: {
          Agendada: { bg: 'bg-purple-500/10', border: 'border-purple-500/30', text: 'text-purple-400', dot: 'bg-purple-400' },
          Presente: { bg: 'bg-purple-500/30', border: 'border-purple-400', text: 'text-purple-200', dot: 'bg-purple-300 shadow-[0_0_8px_rgba(168,85,247,0.8)]' },
          Ausente:  { bg: 'bg-purple-950/30', border: 'border-purple-900/50', text: 'text-purple-600/80', dot: 'bg-purple-800' },
          Cancelada:{ bg: 'bg-zinc-900/50', border: 'border-zinc-800', text: 'text-zinc-600 line-through', dot: 'bg-zinc-700' }
        },
        Estágio: {
          Agendada: { bg: 'bg-pink-500/10', border: 'border-pink-500/30', text: 'text-pink-400', dot: 'bg-pink-400' },
          Presente: { bg: 'bg-pink-500/30', border: 'border-pink-400', text: 'text-pink-200', dot: 'bg-pink-300 shadow-[0_0_8px_rgba(236,72,153,0.8)]' },
          Ausente:  { bg: 'bg-pink-950/30', border: 'border-pink-900/50', text: 'text-pink-600/80', dot: 'bg-pink-800' },
          Cancelada:{ bg: 'bg-zinc-900/50', border: 'border-zinc-800', text: 'text-zinc-600 line-through', dot: 'bg-zinc-700' }
        },
        Extra: {
          Agendada: { bg: 'bg-cyan-500/10', border: 'border-cyan-500/30', text: 'text-cyan-400', dot: 'bg-cyan-400' },
          Presente: { bg: 'bg-cyan-500/30', border: 'border-cyan-400', text: 'text-cyan-200', dot: 'bg-cyan-300 shadow-[0_0_8px_rgba(6,182,212,0.8)]' },
          Ausente:  { bg: 'bg-cyan-950/30', border: 'border-cyan-900/50', text: 'text-cyan-600/80', dot: 'bg-cyan-800' },
          Cancelada:{ bg: 'bg-zinc-900/50', border: 'border-zinc-800', text: 'text-zinc-600 line-through', dot: 'bg-zinc-700' }
        },
        Prova: {
          Agendada: { bg: 'bg-red-500/10', border: 'border-red-500/30', text: 'text-red-400', dot: 'bg-red-400' },
          Presente: { bg: 'bg-red-500/30', border: 'border-red-400', text: 'text-red-200', dot: 'bg-red-300 shadow-[0_0_8px_rgba(239,68,68,0.8)]' },
          Ausente:  { bg: 'bg-red-950/30', border: 'border-red-900/50', text: 'text-red-600/80', dot: 'bg-red-800' },
          Cancelada:{ bg: 'bg-zinc-900/50', border: 'border-zinc-800', text: 'text-zinc-600 line-through', dot: 'bg-zinc-700' }
        },
        Feriado: {
          Agendada: { bg: 'bg-orange-500/10', border: 'border-orange-500/30', text: 'text-orange-400', dot: 'bg-orange-400' },
          Presente: { bg: 'bg-orange-500/10', border: 'border-orange-500/30', text: 'text-orange-400', dot: 'bg-orange-400' },
          Ausente:  { bg: 'bg-orange-500/10', border: 'border-orange-500/30', text: 'text-orange-400', dot: 'bg-orange-400' },
          Cancelada:{ bg: 'bg-zinc-900/50', border: 'border-zinc-800', text: 'text-zinc-600 line-through', dot: 'bg-zinc-700' }
        }
      };

      let normalizedType = type;
      if (normalizedType !== 'Estágio' && normalizedType !== 'Prova' && normalizedType !== 'Feriado' && normalizedType !== 'Prática' && normalizedType !== 'Extra') {
         normalizedType = 'Teórica';
      }

      const t = themes[normalizedType] || themes['Teórica'];
      return t[status] || t['Agendada'];
    };

    function App() {
      const [activeTab, setActiveTab] = useState('dia');
      const [currentDate, setCurrentDate] = useState(getTodayYMD());
      const [events, setEvents] = useState([]);
      const [isFetching, setIsFetching] = useState(true);
      const [syncStatus, setSyncStatus] = useState('synced');
      const [notesModal, setNotesModal] = useState({ isOpen: false, eventId: null });
      const [eventModal, setEventModal] = useState({ isOpen: false, eventId: null });

      // === BUSCAR DADOS DO GOOGLE APPS SCRIPT ===
      useEffect(() => {
        fetch(GAS_URL)
          .then(res => res.json())
          .then(data => {
            const loadedEvents = Array.isArray(data) ? data : (data.events || []);
            if (loadedEvents.length > 0) {
              setEvents(loadedEvents);
            } else {
              setEvents(initialEvents); 
            }
            setIsFetching(false);
          })
          .catch(err => {
            console.error("Erro ao carregar dados da nuvem:", err);
            setEvents(initialEvents);
            setIsFetching(false);
          });
      }, []);

      // === SALVAR DADOS NO GOOGLE APPS SCRIPT ===
      const isFirstRender = useRef(true);
      useEffect(() => {
        if (isFirstRender.current) {
          isFirstRender.current = false;
          return;
        }
        if (isFetching || events.length === 0) return;

        const saveToCloud = async () => {
          setSyncStatus('syncing');
          try {
            await fetch(GAS_URL, {
              method: 'POST',
              body: JSON.stringify(events),
              headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            setSyncStatus('synced');
          } catch(err) {
            console.error("Erro ao sincronizar:", err);
            setSyncStatus('error');
          }
        };

        const timer = setTimeout(saveToCloud, 1500);
        return () => clearTimeout(timer);
      }, [events, isFetching]);

      const getActionBtnConfig = (status) => {
        switch(status) {
          case 'Presente': return { text: 'text-emerald-400', dot: 'bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.6)]', border: 'border-emerald-500/30' };
          case 'Ausente': return { text: 'text-red-400', dot: 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]', border: 'border-red-500/30' };
          case 'Cancelada': return { text: 'text-zinc-500', dot: 'bg-zinc-600', border: 'border-zinc-700/50' };
          default: return { text: 'text-blue-200', dot: 'bg-blue-400 shadow-[0_0_8px_rgba(96,165,250,0.6)]', border: 'border-blue-500/30' };
        }
      };

      const statuses = ['Agendada', 'Presente', 'Ausente', 'Cancelada'];

      const cycleGroupStatus = (date, period, subject) => {
        const groupEvents = events.filter(e => e.date === date && e.period === period && e.subject === subject);
        if (groupEvents.length === 0) return;
        
        const currentStatus = groupEvents[0].status;
        const nextIdx = (statuses.indexOf(currentStatus) + 1) % statuses.length;
        const nextStatus = statuses[nextIdx];

        setEvents(events.map(ev => 
          (ev.date === date && ev.period === period && ev.subject === subject) ? { ...ev, status: nextStatus } : ev
        ));
      };

      const updateEventNotes = (id, notes) => {
        setEvents(events.map(ev => ev.id === id ? { ...ev, notes } : ev));
        setNotesModal({ isOpen: false, eventId: null });
      };

      const updateGrade = (id, value) => {
        setEvents(events.map(ev => ev.id === id ? { ...ev, grade: value } : ev));
      };

      const saveEvent = (data) => {
        if (data.id) {
          setEvents(events.map(ev => ev.id === data.id ? data : ev));
        } else {
          setEvents([...events, { ...data, id: Date.now().toString(), status: 'Agendada', notes: '', grade: '' }]);
        }
        setEventModal({ isOpen: false, eventId: null });
      };

      const saveMultipleEvents = (newEventsArray) => {
        setEvents([...events, ...newEventsArray]);
        setEventModal({ isOpen: false, eventId: null });
      };

      const deleteEvent = (id) => {
        setEvents(events.filter(ev => ev.id !== id));
        setEventModal({ isOpen: false, eventId: null });
      };

      const CloudIndicator = () => (
        <div className="absolute top-5 right-5 z-50 bg-zinc-900/60 backdrop-blur-md p-2 rounded-full border border-white/5 shadow-lg">
          {syncStatus === 'syncing' && <Icons.CloudSync />}
          {syncStatus === 'synced' && <Icons.CloudCheck />}
          {syncStatus === 'error' && <Icons.CloudError />}
        </div>
      );

      if (isFetching) {
        return (
          <div className="w-full h-screen bg-[#09090b] flex flex-col items-center justify-center relative shadow-2xl overflow-hidden">
            <div className="w-10 h-10 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-4"></div>
            <p className="text-zinc-400 text-sm font-medium tracking-wide">Sincronizando com a nuvem...</p>
          </div>
        );
      }

      // --- VIEWS ---

      const DiaView = () => {
        const dayEvents = events.filter(e => e.date === currentDate);
        const todayYMD = getTodayYMD();
        const nextExam = events
            .filter(e => e.type === 'Prova' && e.status !== 'Presente' && e.status !== 'Cancelada' && e.date >= todayYMD)
            .sort((a, b) => a.date.localeCompare(b.date))[0];
        
        const periodsConfig = [
          { name: 'Manhã', icon: Icons.Sun },
          { name: 'Tarde', icon: Icons.Sunset },
          { name: 'Extra', icon: Icons.Star }
        ];

        const dayGroups = [];
        periodsConfig.forEach(p => {
           const pEvents = dayEvents.filter(e => e.period === p.name);
           const subjects = [...new Set(pEvents.map(e => e.subject))];
           subjects.forEach(subj => {
               const evs = pEvents.filter(e => e.subject === subj);
               const isEstagio = evs.some(e => e.type === 'Estágio' || e.subject.toLowerCase().includes('estágio'));
               const isPratica = evs.some(e => e.type === 'Prática');
               
               let alertType = 'Teórica'; 
               if (evs.some(e => e.type === 'Prova')) alertType = 'Prova';
               else if (evs.some(e => e.type === 'Feriado')) alertType = 'Feriado';
               else if (isEstagio) alertType = 'Estágio';
               else if (isPratica) alertType = 'Prática';
               else if (evs.some(e => e.type === 'Extra')) alertType = 'Extra';

               dayGroups.push({
                   period: p.name, icon: p.icon, subject: subj, events: evs, alertType: alertType
               });
           });
        });

        const swipeHandlers = useSwipe(
          () => setCurrentDate(addDays(currentDate, 1)),
          () => setCurrentDate(addDays(currentDate, -1))
        );

        const renderTypeTag = (type) => {
          let colors = 'bg-blue-500/10 text-blue-400 border-blue-500/20'; 
          if (type === 'Prova') colors = 'bg-red-500/10 text-red-400 border-red-500/20';
          else if (type === 'Feriado') colors = 'bg-orange-500/10 text-orange-400 border-orange-500/20';
          else if (type === 'Estágio') colors = 'bg-pink-500/10 text-pink-400 border-pink-500/20';
          else if (type === 'Prática') colors = 'bg-purple-500/10 text-purple-400 border-purple-500/20';
          else if (type === 'Extra') colors = 'bg-cyan-500/10 text-cyan-400 border-cyan-500/20';

          return (
            <span className={`px-2.5 py-0.5 rounded-md text-[9px] md:text-[10px] font-bold uppercase tracking-widest border ${colors}`}>
              {type}
            </span>
          );
        };

        return (
          <div className="flex flex-col h-full overflow-hidden bg-[#09090b] relative" {...swipeHandlers}>
            <div className="flex items-center justify-between p-4 md:px-8 shrink-0 z-10 bg-[#09090b]/80 backdrop-blur-xl border-b border-white/5 pt-8 md:pt-10">
              <button onClick={() => setCurrentDate(addDays(currentDate, -1))} className="p-2.5 text-zinc-400 hover:bg-white/5 hover:text-white rounded-full transition-all active:scale-90"><Icons.ChevronLeft /></button>
              <div className="flex flex-col items-center">
                <span className="text-[10px] font-bold tracking-[0.2em] text-zinc-500 uppercase mb-1">Agenda Diária</span>
                <h2 className="text-xl md:text-2xl font-semibold text-zinc-50 tracking-tight">{getDisplayDate(currentDate)}</h2>
                {nextExam && (
                  <div className="mt-1.5 md:mt-2 px-3 py-1 bg-red-500/10 border border-red-500/20 rounded-full flex items-center gap-1.5 shadow-sm">
                    <div className="w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_5px_rgba(239,68,68,0.8)] animate-pulse"></div>
                    <span className="text-[9px] md:text-[10px] font-bold text-red-400 uppercase tracking-widest">
                      {nextExam.subject} • {getDaysUntilStr(nextExam.date)}
                    </span>
                  </div>
                )}
              </div>
              <button onClick={() => setCurrentDate(addDays(currentDate, 1))} className="p-2.5 text-zinc-400 hover:bg-white/5 hover:text-white rounded-full transition-all active:scale-90"><Icons.ChevronRight /></button>
            </div>

            <div className="flex-1 overflow-y-auto p-4 md:p-8 w-full max-w-4xl mx-auto pb-24 md:pb-12 space-y-4 md:space-y-5">
              {dayGroups.length === 0 ? (
                <div className="rounded-[1.5rem] bg-white/[0.02] border border-dashed border-white/10 p-10 flex flex-col items-center justify-center h-[200px]">
                  <span className="text-sm md:text-base text-zinc-400 font-medium tracking-wide">Dia totalmente livre</span>
                </div>
              ) : (
                dayGroups.map((grp, index) => {
                  const mainEvent = grp.events[0];
                  const currentStatus = mainEvent.status;
                  const isFeriado = grp.alertType === 'Feriado';
                  const actionBtnStyle = getActionBtnConfig(currentStatus);
                  const firstEventId = mainEvent.id;
                  const hasNotes = grp.events.some(e => e.notes && e.notes.trim() !== '');
                  const uniqueLocations = [...new Set(grp.events.map(e => e.location).filter(Boolean))];
                  const uniqueProfs = [...new Set(grp.events.map(e => e.prof).filter(Boolean))];
                  
                  let cardOpacity = 'opacity-100';
                  if (!isFeriado) {
                     if (currentStatus === 'Cancelada') cardOpacity = 'opacity-50 grayscale';
                     if (currentStatus === 'Ausente') cardOpacity = 'opacity-70';
                  }

                  return (
                    <div key={`${grp.period}-${grp.subject}-${index}`} className={`flex flex-col shrink-0 rounded-[1.5rem] relative overflow-hidden border border-white/5 bg-zinc-900/40 shadow-lg transition-all duration-300 ${cardOpacity}`}>
                      <div className="p-4 md:p-5">
                        <div className="flex justify-between items-start mb-4">
                          <div className="flex flex-col gap-2">
                            <div className="flex flex-wrap items-center gap-2 md:gap-3">
                              <div className="text-zinc-500 opacity-80"><grp.icon /></div>
                              <h3 className="text-base md:text-lg font-bold uppercase tracking-widest text-zinc-100">
                                {isFeriado ? (mainEvent.title || grp.subject) : grp.subject}
                              </h3>
                              {renderTypeTag(grp.alertType)}
                            </div>

      const SemanaView = () => {
        const startOfWeek = getStartOfWeek(currentDate);
        const swipeHandlers = useSwipe(() => setCurrentDate(addDays(currentDate, 7)), () => setCurrentDate(addDays(currentDate, -7)));

        const formatHeader = () => {
          const monday = addDays(startOfWeek, 1);
          const saturday = addDays(startOfWeek, 6);
          const [sy, sm, sd] = monday.split('-');
          const [ey, em, ed] = saturday.split('-');
          const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
          return `${sd} ${meses[parseInt(sm)-1]} - ${ed} ${meses[parseInt(em)-1]}`;
        };

        const daysList = Array.from({ length: 6 }, (_, i) => addDays(startOfWeek, i + 1));
        const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

        return (
          <div className="flex flex-col h-full bg-[#09090b] relative" {...swipeHandlers}>

              <button onClick={() => setCurrentDate(addDays(currentDate, -7))} className="p-2.5 text-zinc-400 hover:bg-white/5 hover:text-white rounded-full transition-all active:scale-90"><Icons.ChevronLeft /></button>
              <div className="flex flex-col items-center">
                <span className="text-[10px] font-bold tracking-[0.2em] text-zinc-500 uppercase mb-1">Visão Semanal</span>
                <h2 className="text-lg md:text-xl font-semibold text-zinc-50 tracking-tight">{formatHeader()}</h2>
              </div>
              <button onClick={() => setCurrentDate(addDays(currentDate, 7))} className="p-2.5 text-zinc-400 hover:bg-white/5 hover:text-white rounded-full transition-all active:scale-90"><Icons.ChevronRight /></button>
            </div>

            <div className="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-12">
              <div className="max-w-6xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                {daysList.map((date, idx) => {
                  const dayEvents = events.filter(e => e.date === date);
                  const dateObj = new Date(date.split('-')[0], date.split('-')[1] - 1, date.split('-')[2]);
                  const isToday = date === getTodayYMD();

                  return (
                    <div key={date} onClick={() => { setCurrentDate(date); setActiveTab('dia'); }} className={`flex flex-col rounded-[1.5rem] bg-zinc-900/40 p-5 md:p-6 border cursor-pointer hover:bg-white/[0.04] active:scale-[0.98] transition-all overflow-hidden relative ${isToday ? 'border-blue-500/30 shadow-[0_0_20px_rgba(59,130,246,0.1)]' : 'border-white/5 shadow-lg'}`}>
                      <div className="flex items-end gap-3 mb-4 pb-4 border-b border-white/5">
                        <span className={`text-4xl md:text-5xl font-bold leading-none ${isToday ? 'text-blue-400' : 'text-zinc-200'}`}>{dateObj.getDate()}</span>
                        <span className={`text-xs md:text-sm font-bold tracking-widest uppercase mb-1 ${isToday ? 'text-blue-500/70' : 'text-zinc-500'}`}>{diasSemana[dateObj.getDay()]}</span>
                      </div>
                      <div className="flex flex-col justify-center gap-4 min-h-[60px]">
                        {dayEvents.length === 0 ? <span className="text-sm text-zinc-600 font-medium italic">Nenhuma atividade</span> : (

                            if (pEvents.length === 0) return null;
                            const classList = pEvents.map(e => ({ subject: e.subject, type: e.type, title: e.title, status: e.status }));
                            const uniqueClasses = classList.filter((v, i, a) => a.findIndex(v2 => v.type === 'Feriado' ? (v2.type === 'Feriado' && v2.title === v.title) : (v2.subject === v.subject && v2.type !== 'Feriado')) === i);

                                <div className="flex flex-wrap gap-2">
                                  {uniqueClasses.map((c, i) => {

                                    const theme = getTheme(tType, c.status);

        const [y, m, d] = currentDate.split('-');

        const prevMonth = () => setCurrentDate(formatToYMD(new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1)));

        const grid = [];
        
        for (let i = 0; i < startDay; i++) grid.push(null);

        return (

                <span className="text-[10px] font-bold tracking-[0.2em] text-zinc-500 uppercase mb-1">{viewDate.getFullYear()}</span>
                <h2 className="text-xl md:text-2xl font-semibold text-zinc-50 tracking-tight capitalize">{monthNames[viewDate.getMonth()]}</h2>
              </div>
              <button onClick={nextMonth} className="p-2.5 text-zinc-400 hover:bg-white/5 hover:text-white rounded-full transition-all active:scale-90"><Icons.ChevronRight /></button>

            <div className="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-12">
              <div className="max-w-5xl mx-auto w-full h-full flex flex-col">
                <div className="grid grid-cols-7 gap-2 md:gap-4 mb-4 shrink-0">
                  {['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'].map((d,i) => <div key={i} className="text-center text-[10px] md:text-xs font-bold tracking-widest text-zinc-500 uppercase">{d}</div>)}
                </div>
                <div className="grid grid-cols-7 gap-2 md:gap-4 flex-1 auto-rows-fr">
                  {grid.map((dateStr, idx) => {
                    if (!dateStr) return <div key={`empty-${idx}`} className="rounded-[1rem] bg-white/[0.01] min-h-[4.5rem]"></div>;
                    const dayEvents = events.filter(e => e.date === dateStr);
                    const dayNum = dateStr.split('-')[2];
                    const isToday = dateStr === getTodayYMD();

                    const uniqueDayEvents = dayEvents.filter((v, i, a) => a.findIndex(v2 => v.type === 'Feriado' ? (v2.type === 'Feriado' && v2.title === v.title) : (v2.subject === v.subject && v2.type !== 'Feriado')) === i);

                    return (
                      <div key={dateStr} onClick={() => { setCurrentDate(dateStr); setActiveTab('dia'); }} className={`min-h-[4.5rem] md:min-h-[6rem] flex flex-col p-2 md:p-3 rounded-[1rem] md:rounded-[1.5rem] border cursor-pointer hover:bg-white/[0.05] active:scale-95 transition-all overflow-hidden relative shadow-sm ${isToday ? 'bg-blue-500/10 border-blue-500/30 shadow-[0_0_20px_rgba(59,130,246,0.15)]' : 'bg-zinc-900/40 border-white/5'}`}>
                        <span className={`text-sm md:text-lg font-bold self-center relative z-10 ${isToday ? 'text-blue-400' : 'text-zinc-300'}`}>{parseInt(dayNum)}</span>
                        <div className="flex flex-col gap-1 mt-auto w-full">
                          <div className="flex md:hidden flex-wrap gap-[3px] w-full justify-center">
                            {uniqueDayEvents.slice(0, 4).map(e => {
                               let tType = e.type;
                               if (e.subject.toLowerCase().includes('estágio')) tType = 'Estágio';
                               const theme = getTheme(tType, e.status);
                               return <div key={e.id} className={`w-1.5 h-1.5 rounded-full transition-colors duration-300 ${theme.dot}`}></div>
                            })}
                          </div>
                          <div className="hidden md:flex flex-col gap-1 w-full items-center">
                            {uniqueDayEvents.slice(0, 3).map(e => {
                               let tType = e.type;
                               if (e.subject.toLowerCase().includes('estágio')) tType = 'Estágio';
                               const theme = getTheme(tType, e.status);
                               return <div key={e.id} className={`text-[9px] w-full truncate text-center px-1.5 py-0.5 rounded border font-semibold tracking-wide transition-colors duration-300 ${theme.bg} ${theme.border} ${theme.text}`}>{e.type === 'Feriado' ? e.title : e.subject}</div>
                            })}
                            {uniqueDayEvents.length > 3 && <div className="text-[9px] text-zinc-500 font-bold pl-1 text-center">+{uniqueDayEvents.length-3}</div>}
                          </div>
                        </div>
                      </div>
                    )
                  })}
                </div>
              </div>
            </div>
          </div>
        );
      };

      const SemestreView = () => {
        const year = 2026;
        const targetMonths = [2, 3, 4, 5, 6]; 
        const monthNames = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const todayYMD = getTodayYMD();
        const currentMonth = new Date(todayYMD).getMonth();

        return (
          <div className="flex flex-col h-full bg-[#09090b] relative overflow-hidden">
            <div className="flex items-center justify-center p-4 md:px-8 shrink-0 z-10 bg-[#09090b]/80 backdrop-blur-xl border-b border-white/5 pt-8 md:pt-10">
              <span className="text-[10px] font-bold tracking-[0.2em] text-zinc-500 uppercase mb-1">Calendário Semestral</span>

              <div className="max-w-4xl mx-auto flex flex-wrap justify-center gap-4 md:gap-6 mb-12">
                 {[ { label: 'Teórica', color: 'bg-blue-500' }, { label: 'Prática', color: 'bg-purple-500' }, { label: 'Estágio', color: 'bg-pink-500' }, { label: 'Prova', color: 'bg-red-500' }, { label: 'Feriado', color: 'bg-orange-500' }, { label: 'Extra', color: 'bg-cyan-500' } ].map(leg => (
                    <div key={leg.label} className="flex items-center gap-2">
                       <div className={`w-1.5 h-1.5 rounded-full ${leg.color}`}></div>
                       <span className="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">{leg.label}</span>

                 ))}
              </div>

              <div className="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-16">
                {targetMonths.map(month => {
                  const daysInMonth = new Date(year, month + 1, 0).getDate();
                  const startDay = new Date(year, month, 1).getDay();
                  const isCurrentMonth = month === currentMonth;

                  return (
                    <div key={month} className="flex flex-col w-full max-w-[280px] mx-auto">
                      <h3 className={`text-xl font-bold mb-6 ${isCurrentMonth ? 'text-blue-400' : 'text-zinc-100'}`}>{monthNames[month]}</h3>
                      <div className="grid grid-cols-7 gap-y-4 gap-x-2">
                        {['D','S','T','Q','Q','S','S'].map((d,i) => <div key={i} className="text-zinc-500 text-xs font-medium text-center">{d}</div>)}
                        {Array.from({length: startDay}).map((_, i) => <div key={`empty-${i}`}></div>)}
                        {Array.from({length: daysInMonth}).map((_, i) => {
                          const d = i + 1;
                          const dateStr = formatToYMD(new Date(year, month, d));
                          const dayEvents = events.filter(e => e.date === dateStr);
                          const isToday = dateStr === todayYMD;

                          const eventTypes = [...new Set(dayEvents.map(e => {
                              if (e.type === 'Prova') return 'red';
                              if (e.type === 'Feriado') return 'orange';
                              if (e.type === 'Estágio' || e.subject.toLowerCase().includes('estágio')) return 'pink';
                              if (e.type === 'Prática') return 'purple';
                              if (e.type === 'Extra') return 'cyan';
                              return 'blue';
                          }))];
                          
                          const colorPriority = { red: 1, orange: 2, pink: 3, purple: 4, cyan: 5, blue: 6 };
                          eventTypes.sort((a,b) => colorPriority[a] - colorPriority[b]);

                          const colorMap = { 'red': 'bg-red-500', 'orange': 'bg-orange-500', 'pink': 'bg-pink-500', 'purple': 'bg-purple-500', 'cyan': 'bg-cyan-500', 'blue': 'bg-blue-500' };

                          let textClass = 'text-zinc-500';
                          let bgClass = 'hover:bg-white/5';
                          
                          if (isToday) { bgClass = 'bg-blue-600 shadow-[0_0_12px_rgba(37,99,235,0.6)]'; textClass = 'text-white font-bold'; } 
                          else if (dayEvents.length > 0) { textClass = 'text-zinc-100 font-medium'; }

                          const currentDateObj = new Date(year, month, d);
                          const isOutOfSemester = currentDateObj < new Date(2026, 2, 2) || currentDateObj > new Date(2026, 6, 3);
                          if (isOutOfSemester) textClass = 'text-zinc-800'; 

                          return (
                            <div key={d} className="flex justify-center items-center aspect-square relative group">
                               <div onClick={() => { setCurrentDate(dateStr); setActiveTab('dia'); }} className={`relative flex flex-col items-center justify-center w-8 h-8 rounded-full transition-all cursor-pointer ${bgClass}`}>
                                 <span className={`text-[13px] ${textClass}`}>{d}</span>
                                 {!isToday && !isOutOfSemester && eventTypes.length > 0 && (
                                     <div className="absolute bottom-1 flex gap-[2px]">
                                         {eventTypes.slice(0,3).map((c, idx) => <div key={idx} className={`w-[3px] h-[3px] rounded-full ${colorMap[c]}`}></div>)}
                                     </div>
                                 )}
                               </div>
                            </div>
                          )
                        })}
                      </div>
                    </div>
                  )
                })}
              </div>
            </div>
          </div>
        )
      };

      const ControleView = () => {
        const absCount = useMemo(() => {
          const counts = {};
          events.forEach(e => {
            if (e.status === 'Ausente') {
              let subj = e.subject;
              if (subj === 'Obstetrícia' || subj === 'Neonatologia') subj = 'Obs/Neo';
              counts[subj] = (counts[subj] || 0) + 1;
            }
          });
          return counts;
        }, [events]);

        const totalAbsences = Object.values(absCount).reduce((a, b) => a + b, 0);

        const examsBySubject = useMemo(() => {
          const grouped = {};
          events.filter(e => e.type === 'Prova' && !e.title.toLowerCase().includes('2ª chamada')).forEach(e => {
            if(!grouped[e.subject]) grouped[e.subject] = [];
            grouped[e.subject].push(e);
          });
          return grouped;
        }, [events]);

        return (
          <div className="flex flex-col h-full bg-[#09090b] relative">
            <div className="flex items-center justify-center p-4 md:px-8 shrink-0 z-10 bg-[#09090b]/80 backdrop-blur-xl border-b border-white/5 pt-8 md:pt-10">
              <span className="text-[10px] font-bold tracking-[0.2em] text-zinc-500 uppercase mb-1">Controle Acadêmico</span>
            </div>

            <div className="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-12">
              <div className="max-w-4xl mx-auto w-full space-y-10 pt-4">

                  <div className="md:col-span-1 bg-zinc-900/40 rounded-[2rem] p-8 border border-white/5 shadow-xl flex flex-col items-center justify-center overflow-hidden min-h-[180px]">
                    <span className="text-6xl md:text-7xl font-black text-white z-10 drop-shadow-md">{totalAbsences}</span>
                    <span className="text-[10px] md:text-xs font-bold text-zinc-400 mt-4 uppercase tracking-[0.2em] z-10">Faltas Acumuladas</span>
                  </div>

                  <div className="md:col-span-2 flex flex-col">
                    <div className="flex items-center gap-3 mb-4 pl-2">
                      <h3 className="text-[11px] md:text-xs font-bold text-zinc-500 uppercase tracking-widest">Faltas por Disciplina</h3>
                    </div>
                    {Object.keys(absCount).length === 0 ? (
                      <div className="flex-1 flex items-center justify-center border border-dashed border-white/10 rounded-[2rem] bg-white/[0.01]">
                        <p className="text-zinc-500 text-sm font-medium">Nenhuma falta registada. Excelente!</p>
                      </div>
                    ) : (
                      <div className="space-y-3 flex-1 flex flex-col justify-center">
                        {Object.entries(absCount).map(([subj, count]) => (
                          <div key={subj} className="flex items-center justify-between bg-white/[0.02] hover:bg-white/[0.04] transition-colors p-4 md:p-5 rounded-2xl border border-white/5">
                            <div className="flex items-center gap-4">
                              <div className="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.8)]"></div>
                              <span className="text-[14px] md:text-base font-bold text-zinc-200 tracking-wide">{subj}</span>
                            </div>
                            <div className="flex items-center gap-2">
                              <span className="text-xl font-black text-red-400">{count}</span>
                              <span className="text-[10px] uppercase font-bold text-zinc-600 tracking-widest">faltas</span>
                            </div>
                          </div>
                        ))}
                        <p className="text-[10px] text-zinc-600 mt-4 text-center font-semibold tracking-wide">* Neonatologia e Obstetrícia unificadas na contagem.</p>
                      </div>
                    )}
                  </div>
                </div>

                <div>
                  <div className="flex items-center gap-3 mb-6 pl-2">
                    <h3 className="text-[11px] md:text-xs font-bold text-zinc-500 uppercase tracking-widest">Desempenho e Avaliações</h3>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {Object.entries(examsBySubject).map(([subj, subjExams]) => {
                      const upcomingExams = subjExams.filter(e => {
                        const [y, m, d] = e.date.split('-');
                        const exDate = new Date(y, m-1, d);
                        exDate.setHours(0,0,0,0);
                        const today = new Date();
                        today.setHours(0,0,0,0);
                        return exDate >= today;
                      }).sort((a,b) => a.date.localeCompare(b.date));

                      const nextExam = upcomingExams[0];

                      return (
                        <div key={subj} className="bg-zinc-900/40 p-6 rounded-[2rem] border border-white/5 shadow-xl flex flex-col">
                          <div className="flex justify-between items-start mb-6 border-b border-white/5 pb-5">
                            <span className="text-lg md:text-xl font-bold text-zinc-100 tracking-wide">{subj}</span>
                            {nextExam ? (
                              <span className="text-[9px] md:text-[10px] font-bold uppercase tracking-widest bg-blue-500/10 text-blue-400 px-3 py-1.5 rounded-lg border border-blue-500/20 text-center shadow-sm">Próxima: {getDaysUntilStr(nextExam.date)}</span>
                            ) : (
                              <span className="text-[9px] md:text-[10px] font-bold uppercase tracking-widest bg-emerald-500/10 text-emerald-400 px-3 py-1.5 rounded-lg border border-emerald-500/20">Concluídas</span>
                            )}
                          </div>
                          
                          <div className="space-y-4 flex-1">
                            {subjExams.map(ex => {
                              let displayTitle = ex.title;
                              if ((subj === 'ABS6' || subj === 'Obstetrícia') && ex.type === 'Prova') displayTitle = 'Prova Única';

                              return (
                                <div key={ex.id} className="flex justify-between items-center group">
                                  <div className="flex flex-col gap-1 pr-4">
                                    <span className="text-[13px] md:text-sm text-zinc-300 font-medium leading-tight group-hover:text-white transition-colors">{displayTitle}</span>
                                    <span className="text-[11px] text-zinc-500 font-mono font-semibold tracking-wide">{ex.date.split('-').reverse().join('/')}</span>
                                  </div>
                                  <div className="relative">
                                    <input type="number" placeholder="--" value={ex.grade || ''} onChange={(e) => updateGrade(ex.id, e.target.value)} className="w-16 h-12 bg-white/[0.03] border border-white/10 hover:border-white/20 rounded-xl text-center text-base font-black text-white placeholder-zinc-700 focus:outline-none focus:border-blue-500 focus:bg-white/[0.05] transition-all shrink-0" step="0.1" min="0" max="10"/>
                                  </div>
                                </div>
                              )
                            })}
                          </div>
                        </div>
                      )
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // --- MODALS ---
      const NotesModal = () => {
        if (!notesModal.isOpen) return null;
        const event = events.find(e => e.id === notesModal.eventId);
        const [localNotes, setLocalNotes] = useState(event?.notes || '');

        return (
          <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-[60] flex items-center justify-center p-4">
            <div className="bg-[#09090b] w-full max-w-lg rounded-[2rem] shadow-[0_0_40px_rgba(0,0,0,0.5)] border border-white/10 flex flex-col overflow-hidden">
              <div className="p-6 md:p-8 border-b border-white/5 bg-zinc-900/40">
                <h3 className="text-xl md:text-2xl font-bold text-white leading-tight">Anotações</h3>
                <p className="text-xs font-bold text-blue-400 uppercase tracking-widest mt-2">{event.subject}</p>
              </div>
              <div className="p-6 md:p-8 bg-zinc-900/20">
                <textarea value={localNotes} onChange={(e) => setLocalNotes(e.target.value)} placeholder="Tópicos da aula, avisos do professor..." className="w-full h-48 md:h-64 bg-white/[0.02] border border-white/10 rounded-2xl p-5 text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-blue-500 focus:bg-white/[0.05] transition-all resize-none text-sm md:text-base font-medium leading-relaxed"></textarea>
              </div>
              <div className="p-5 md:p-6 border-t border-white/5 flex justify-end gap-3 md:gap-4 bg-zinc-900/40">
                <button onClick={() => setNotesModal({ isOpen: false, eventId: null })} className="px-6 py-3 text-sm md:text-base font-bold text-zinc-400 hover:text-white hover:bg-white/5 rounded-xl transition-colors">Cancelar</button>
                <button onClick={() => updateEventNotes(event.id, localNotes)} className="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white text-sm md:text-base font-bold rounded-xl shadow-[0_4px_20px_rgba(37,99,235,0.4)] transition-all active:scale-95">Guardar</button>
              </div>
            </div>
          </div>
        );
      };

      const EventModal = () => {
        if (!eventModal.isOpen) return null;
        const existingEvent = eventModal.eventId ? events.find(e => e.id === eventModal.eventId) : null;
        const [formData, setFormData] = useState(existingEvent || { date: currentDate, period: 'Manhã', time: '08:00', subject: '', title: '', type: 'Teórica', location: '', prof: '' });
        const [isRecurring, setIsRecurring] = useState(false);
        const [recurrenceFrequency, setRecurrenceFrequency] = useState('weekly');
        const [recurrenceEndDate, setRecurrenceEndDate] = useState('2026-06-30');

        const handleSubmit = () => {
          if(!formData.subject || !formData.title) return alert("Preencha disciplina e título");
          if (!existingEvent && isRecurring) {
            let currentD = new Date(formData.date + 'T12:00:00'); 
            const endD = new Date(recurrenceEndDate + 'T12:00:00');
            const step = recurrenceFrequency === 'weekly' ? 7 : 14;
            const newEvents = [];
            if (currentD > endD) return alert("A data limite deve ser igual ou posterior à data de início.");
            while (currentD <= endD) {
              newEvents.push({ ...formData, date: formatToYMD(currentD), id: Date.now().toString() + Math.random().toString(36).substring(2, 9), status: 'Agendada', notes: '', grade: '' });
              currentD.setDate(currentD.getDate() + step);
            }
            saveMultipleEvents(newEvents);
          } else {
            saveEvent(formData);
          }
        };

        return (
          <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-[60] flex items-center justify-center p-4">
            <div className="bg-[#09090b] w-full max-w-lg rounded-[2rem] shadow-[0_0_40px_rgba(0,0,0,0.5)] border border-white/10 flex flex-col max-h-[90vh] overflow-hidden">
              <div className="p-6 md:p-8 border-b border-white/5 bg-zinc-900/40 shrink-0">
                <h3 className="text-xl md:text-2xl font-bold text-white">{existingEvent ? 'Editar Atividade' : 'Nova Atividade'}</h3>
              </div>
              <div className="p-6 md:p-8 overflow-y-auto space-y-5 bg-zinc-900/20 flex-1">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5">
                  <input type="text" placeholder="Disciplina (ex: Liga Acadêmica)" className="w-full bg-white/[0.02] border border-white/10 rounded-xl p-4 text-white text-sm font-medium placeholder-zinc-600 focus:border-blue-500 focus:bg-white/[0.05] focus:outline-none transition-all" value={formData.subject} onChange={e => setFormData({...formData, subject: e.target.value})} />
                  <input type="text" placeholder="Assunto ou Título" className="w-full bg-white/[0.02] border border-white/10 rounded-xl p-4 text-white text-sm font-medium placeholder-zinc-600 focus:border-blue-500 focus:bg-white/[0.05] focus:outline-none transition-all" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                </div>
                <div className="grid grid-cols-2 gap-4 md:gap-5">
                  <div className="flex flex-col"><span className="text-[9px] text-zinc-500 font-bold uppercase tracking-widest ml-1 mb-1.5">Data de Início</span><input type="date" className="w-full bg-white/[0.02] border border-white/10 rounded-xl p-4 text-white text-sm font-medium focus:border-blue-500 focus:bg-white/[0.05] focus:outline-none transition-all" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} /></div>
                  <div className="flex flex-col"><span className="text-[9px] text-zinc-500 font-bold uppercase tracking-widest ml-1 mb-1.5">Horário</span><input type="time" className="w-full bg-white/[0.02] border border-white/10 rounded-xl p-4 text-white text-sm font-medium focus:border-blue-500 focus:bg-white/[0.05] focus:outline-none transition-all" value={formData.time} onChange={e => setFormData({...formData, time: e.target.value})} /></div>
                </div>
                <div className="grid grid-cols-2 gap-4 md:gap-5">
                  <select className="w-full bg-white/[0.02] border border-white/10 rounded-xl p-4 text-white text-sm font-medium focus:border-blue-500 focus:bg-white/[0.05] focus:outline-none transition-all appearance-none" value={formData.period} onChange={e => setFormData({...formData, period: e.target.value})}>
                    <option value="Manhã" className="bg-zinc-900">Manhã</option><option value="Tarde" className="bg-zinc-900">Tarde</option><option value="Extra" className="bg-zinc-900">Extra</option>
                  </select>
                  <select className="w-full bg-white/[0.02] border border-white/10 rounded-xl p-4 text-white text-sm font-medium focus:border-blue-500 focus:bg-white/[0.05] focus:outline-none transition-all appearance-none" value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})}>
                    <option value="Teórica" className="bg-zinc-900">Teórica</option><option value="Prática" className="bg-zinc-900">Prática</option><option value="Estágio" className="bg-zinc-900">Estágio</option><option value="Prova" className="bg-zinc-900">Prova</option><option value="Feriado" className="bg-zinc-900">Feriado</option><option value="Extra" className="bg-zinc-900">Atividade Extra</option>
                  </select>
                </div>
                <div className="grid grid-cols-2 gap-4 md:gap-5">
                  <input type="text" placeholder="Local (ex: Sala E)" className="w-full bg-white/[0.02] border border-white/10 rounded-xl p-4 text-white text-sm font-medium placeholder-zinc-600 focus:border-blue-500 focus:bg-white/[0.05] focus:outline-none transition-all" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} />
                  <input type="text" placeholder="Prof. (Opcional)" className="w-full bg-white/[0.02] border border-white/10 rounded-xl p-4 text-white text-sm font-medium placeholder-zinc-600 focus:border-blue-500 focus:bg-white/[0.05] focus:outline-none transition-all" value={formData.prof} onChange={e => setFormData({...formData, prof: e.target.value})} />
                </div>
                {!existingEvent && (
                  <div className="flex flex-col gap-4 pt-5 border-t border-white/5">
                    <label className="flex items-center gap-3 text-sm font-bold tracking-wide text-zinc-300 cursor-pointer w-max hover:text-white transition-colors">
                      <div className={`w-5 h-5 rounded flex items-center justify-center border transition-colors ${isRecurring ? 'bg-blue-600 border-blue-500' : 'bg-white/[0.05] border-white/10'}`}>
                        {isRecurring && <svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>}
                      </div>
                      <input type="checkbox" className="hidden" checked={isRecurring} onChange={e => setIsRecurring(e.target.checked)} />
                      Repetir esta atividade
                    </label>
                    {isRecurring && (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5 bg-white/[0.02] p-5 rounded-2xl border border-white/5 mt-2">
                        <div className="flex flex-col"><span className="text-[9px] text-zinc-500 font-bold uppercase tracking-widest ml-1 mb-1.5">Frequência</span><select className="w-full bg-zinc-900/80 border border-white/10 rounded-xl p-3.5 text-white text-sm font-medium focus:border-blue-500 focus:outline-none transition-all appearance-none" value={recurrenceFrequency} onChange={e => setRecurrenceFrequency(e.target.value)}><option value="weekly">Toda semana</option><option value="biweekly">Semana sim, semana não</option></select></div>
                        <div className="flex flex-col"><span className="text-[9px] text-zinc-500 font-bold uppercase tracking-widest ml-1 mb-1.5">Repetir até</span><input type="date" className="w-full bg-zinc-900/80 border border-white/10 rounded-xl p-3.5 text-white text-sm font-medium focus:border-blue-500 focus:outline-none transition-all" value={recurrenceEndDate} onChange={e => setRecurrenceEndDate(e.target.value)} /></div>
                      </div>
                    )}
                  </div>
                )}
              </div>
              <div className="p-5 md:p-6 flex justify-between items-center border-t border-white/5 bg-zinc-900/40 shrink-0">
                <div>
                  {existingEvent && <button onClick={() => deleteEvent(existingEvent.id)} className="p-3 bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white rounded-xl transition-colors"><Icons.Trash /></button>}
                </div>
                <div className="flex gap-3 md:gap-4">
                  <button onClick={() => setEventModal({ isOpen: false, eventId: null })} className="px-6 py-3 text-sm md:text-base font-bold text-zinc-400 hover:text-white hover:bg-white/5 rounded-xl transition-colors">Cancelar</button>
                  <button onClick={handleSubmit} className="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white text-sm md:text-base rounded-xl font-bold shadow-[0_4px_20px_rgba(37,99,235,0.4)] transition-all active:scale-95">{existingEvent ? 'Guardar' : 'Adicionar'}</button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="w-full h-screen flex flex-col md:flex-row bg-[#09090b] text-zinc-100 font-sans relative overflow-hidden selection:bg-blue-500/30">
          <CloudIndicator />
          <nav className="z-50 shrink-0 fixed md:relative bottom-0 left-0 w-full md:w-28 h-[85px] md:h-full bg-[#09090b] flex md:flex-col items-start md:items-center justify-around md:justify-center px-4 md:px-0 pt-3 md:pt-0 pb-safe md:py-10 md:gap-8 border-t md:border-t-0 md:border-r border-white/5">
            {[ { id: 'dia', label: 'Dia', Icon: Icons.Day }, { id: 'semana', label: 'Semana', Icon: Icons.Week }, { id: 'mes', label: 'Mês', Icon: Icons.Month }, { id: 'semestre', label: 'Semestre', Icon: Icons.Semester }, { id: 'controle', label: 'Controle', Icon: Icons.Control } ].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className="flex flex-col items-center justify-center gap-1.5 transition-all group relative w-14 md:w-full">
                <div className={`p-2.5 md:p-3.5 rounded-2xl md:rounded-3xl transition-all duration-300 ${activeTab === tab.id ? 'bg-white/10 text-white shadow-[0_0_20px_rgba(255,255,255,0.05)]' : 'text-zinc-600 hover:text-zinc-300 hover:bg-white/5'}`}>
                  <tab.Icon />
                </div>
                <span className={`text-[9px] md:text-[10px] font-bold uppercase tracking-widest transition-colors ${activeTab === tab.id ? 'text-white' : 'text-zinc-600'}`}>{tab.label}</span>
              </button>
            ))}
          </nav>
          <main className="flex-1 relative overflow-hidden bg-[#09090b] z-20 flex flex-col mb-[85px] md:mb-0">
            <div key={activeTab} className="flex-1 h-full w-full relative">
              {activeTab === 'dia' && <DiaView />}
              {activeTab === 'semana' && <SemanaView />}
              {activeTab === 'mes' && <MesView />}
              {activeTab === 'semestre' && <SemestreView />}
              {activeTab === 'controle' && <ControleView />}
            </div>
          </main>
          <NotesModal />
          <EventModal />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
